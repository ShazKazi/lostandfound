{% extends 'base.html' %}

{% block content %}
<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        color: #fff;
        overflow: hidden;
        background: linear-gradient(135deg, #1F1C2C, #6C63FF, #00F2FE);
    }

    /* Animated background canvas */
    #bgCanvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
    }

    .form-container {
        max-width: 500px;
        margin: 100px auto;
        padding: 40px;
        border-radius: 16px;
        backdrop-filter: blur(12px);
        background: rgba(255,255,255,0.08);
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        text-align: center;
    }

    .form-container h2 {
        margin-bottom: 20px;
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(90deg, #FF9A9E, #FBC2EB, #00F2FE);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    input, select, textarea {
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        background: rgba(255,255,255,0.15);
        color: #fff;
        transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        background: rgba(255,255,255,0.25);
        box-shadow: 0 0 10px rgba(108,99,255,0.6);
    }

    button {
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(90deg, #6C63FF, #00F2FE);
        color: #fff;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
</style>

<!-- Background animation -->
<canvas id="bgCanvas"></canvas>

<div class="form-container">
    <h2>Report an Item</h2>
    <form method="POST">
        <select name="type" required>
            <option value="">Select Type</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
        </select>

        <input type="text" name="title" placeholder="Item name" required>
        <textarea name="description" placeholder="Description"></textarea>
        <input type="text" name="location" placeholder="Location">
        <input type="date" name="date">
        <input type="text" name="contact" placeholder="Contact">

        <button type="submit">Submit</button>
    </form>
</div>

<script>
    // Particle animation for background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for (let i = 0; i < 80; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 3 + 1,
            dx: (Math.random() - 0.5) * 0.5,
            dy: (Math.random() - 0.5) * 0.5
        });
    }

    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fill();

            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        });
        requestAnimationFrame(drawParticles);
    }
    drawParticles();
</script>
{% endblock %}
